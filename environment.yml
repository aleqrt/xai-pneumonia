name: xai-pneumonia
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy<2.0
  - pandas>=1.5
  - matplotlib>=3.6
  - seaborn>=0.12
  - scikit-learn>=1.2
  - tqdm>=4.64
  - pillow>=9.4
  - ipykernel>=6.0
  - jupyterlab>=3.0
  - pip
  - pip:
      # TF < 2.16 required for legacy Keras 2 APIs
      - tensorflow>=2.11,<2.16
      - imgaug>=0.4
      - lime>=0.2
      - opencv-python>=4.7
